<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
 
<body>
 
<form onsubmit="return validate(this);">
 
    <fieldset>
 
        <legend>Student Information Form</legend>
 
        <!-- First Table -->
 
        <table>
 
            <tr>
<th colspan="3">Registration Information</th>
</tr>
 
            <tr>
<td>
<label for="username">Username</label>
</td>
 
                <td>
<input type="text" name="username" id="username">
</td>
 
                <td>
<span id="usernameErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="fatherName">Father's Name</label>
</td>
 
                <td>
<input type="text" name="fatherName" id="fatherName">
</td>
 
                <td>
<span id="fatherNameErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="motherName">Mother's Name</label>
</td>
 
                <td>
<input type="text" name="motherName" id="motherName">
</td>
 
                <td>
<span id="motherNameErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="password">Password</label>
</td>
 
                <td>
<input type="password" name="password" id="password">
</td>
 
                <td>
<span id="passwordErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="department">Department</label>
</td>
 
                <td>
<select name="department" id="department">
<option value="">Select Department</option>
<option value="CSE">CSE</option>
<option value="EEE">EEE</option>
<option value="BBA">BBA</option>
<option value="English">English</option>
</select>
</td>
 
                <td>
<span id="departmentErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="religion">Religion</label>
</td>
 
                <td>
<select name="religion" id="religion">
<option value="">Select Religion</option>
<option value="Islam">Islam</option>
<option value="Hinduism">Hinduism</option>
<option value="Christianity">Christianity</option>
<option value="Buddhism">Buddhism</option>
</select>
</td>
 
                <td>
<span id="religionErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="city">City</label>
</td>
 
                <td>
<input type="text" name="city" id="city">
</td>
 
                <td>
<span id="cityErrMsg" style="color:red"></span>
</td>
</tr>
 
        </table>
 
        <br>
 
        <!-- Second Table -->
 
        <table>
 
            <tr>
<th colspan="3">Contact Information</th>
</tr>
 
            <tr>
<td>
<label for="email">Email</label>
</td>
 
                <td>
<input type="text" name="email" id="email">
</td>
 
                <td>
<span id="emailErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="phone">Phone Number</label>
</td>
 
                <td>
<input type="text" name="phone" id="phone">
</td>
 
                <td>
<span id="phoneErrMsg" style="color:red"></span>
</td>
</tr>
 
            <tr>
<td>
<label for="address">Address</label>
</td>
 
                <td>
<textarea name="address" id="address"></textarea>
</td>
 
                <td>
<span id="addressErrMsg" style="color:red"></span>
</td>
</tr>
 
        </table>
 
        <br>
 
        <input type="submit" value="Submit">
 
    </fieldset>
 
</form>
 
 
<script>
 
    function validate(x) {
 
        const username = x.username.value;

        const fatherName = x.fatherName.value;

        const motherName = x.motherName.value;

        const password = x.password.value;

        const department = x.department.value;

        const religion = x.religion.value;

        const city = x.city.value;

        const email = x.email.value;

        const phone = x.phone.value;

        const address = x.address.value;
 
 
        let usernameErrMsg =

            document.getElementById("usernameErrMsg");
 
        usernameErrMsg.innerHTML = "";
 
 
        let fatherNameErrMsg =

            document.getElementById("fatherNameErrMsg");
 
        fatherNameErrMsg.innerHTML = "";
 
 
        let motherNameErrMsg =

            document.getElementById("motherNameErrMsg");
 
        motherNameErrMsg.innerHTML = "";
 
 
        let passwordErrMsg =

            document.getElementById("passwordErrMsg");
 
        passwordErrMsg.innerHTML = "";
 
 
        let departmentErrMsg =

            document.getElementById("departmentErrMsg");
 
        departmentErrMsg.innerHTML = "";
 
 
        let religionErrMsg =

            document.getElementById("religionErrMsg");
 
        religionErrMsg.innerHTML = "";
 
 
        let cityErrMsg =

            document.getElementById("cityErrMsg");
 
        cityErrMsg.innerHTML = "";
 
 
        let emailErrMsg =

            document.getElementById("emailErrMsg");
 
        emailErrMsg.innerHTML = "";
 
 
        let phoneErrMsg =

            document.getElementById("phoneErrMsg");
 
        phoneErrMsg.innerHTML = "";
 
 
        let addressErrMsg =

            document.getElementById("addressErrMsg");
 
        addressErrMsg.innerHTML = "";
 
 
        let flag = true;
 
 
        if (username === "") {
 
            usernameErrMsg.innerHTML = "Username is empty";

            flag = false;

        }
 
 
        if (fatherName === "") {
 
            fatherNameErrMsg.innerHTML =

                "Father's name is empty";
 
            flag = false;

        }
 
 
        if (motherName === "") {
 
            motherNameErrMsg.innerHTML =

                "Mother's name is empty";
 
            flag = false;

        }
 
 
        if (password === "") {
 
            passwordErrMsg.innerHTML =

                "Password is empty";
 
            flag = false;

        }
 
        else if (password.length < 4) {
 
            passwordErrMsg.innerHTML =

                "Password must be minimum 4 characters";
 
            flag = false;

        }
 
        else if (!password.match(/[A-Z]/)) {
 
            passwordErrMsg.innerHTML =

                "Password must contain uppercase letter";
 
            flag = false;

        }
 
        else if (!password.match(/[a-z]/)) {
 
            passwordErrMsg.innerHTML =

                "Password must contain lowercase letter";
 
            flag = false;

        }
 
        else if (!password.match(/[0-9]/)) {
 
            passwordErrMsg.innerHTML =

                "Password must contain a number";
 
            flag = false;

        }
 
 
        if (department === "") {
 
            departmentErrMsg.innerHTML =

                "Department is empty";
 
            flag = false;

        }
 
 
        if (religion === "") {
 
            religionErrMsg.innerHTML =

                "Religion is empty";
 
            flag = false;

        }
 
 
        if (city === "") {
 
            cityErrMsg.innerHTML =

                "City is empty";
 
            flag = false;

        }
 
 
        if (email === "") {
 
            emailErrMsg.innerHTML =

                "Email is empty";
 
            flag = false;

        }
 
        else if (!email.match(/^[^ ]+@[^ ]+\.[a-z]{2,3}$/)) {
 
            emailErrMsg.innerHTML =

                "Invalid email";
 
            flag = false;

        }
 
 
        if (phone === "") {
 
            phoneErrMsg.innerHTML =

                "Phone number is empty";
 
            flag = false;

        }
 
        else if (!phone.match(/^[0-9]{11}$/)) {
 
            phoneErrMsg.innerHTML =

                "Phone number must be 11 digits";
 
            flag = false;

        }
 
 
        if (address === "") {
 
            addressErrMsg.innerHTML =

                "Address is empty";
 
            flag = false;

        }
 
 
        if (flag === true) {
 
            alert("Form submitted successfully");

        }
 
 
        return flag;

    }
 
</script>
 
</body>
</html>
