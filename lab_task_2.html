<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>
    <h1>Registration</h1>
    <form>
        <table cellpadding="20">
            <tr>
                <!-- General Information -->
                <td valign="top">
                    <fieldset>
                        <legend>General Information</legend>
                        <table cellpadding="8">
                            <tr>
                                <td><b>First Name</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td><b>Last Name</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td><b>Gender</b></td>
                                <td>:</td>
                                <td>
                                    <input type="radio" name="gender">Male
                                    <input type="radio" name="gender">Female
                                </td>
                            </tr>
                            <tr>
                                <td><b>Father's Name</b></td>
                                <td>:</td>
                                <td>
                                    <input type="text">
                                    <input type="file">
                                </td>
                            </tr>
                            <tr>
                                <td><b>Mother's Name</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td><b>Blood Group</b></td>
                                <td>:</td>
                                <td>
                                    <select>
                                        <option>A+</option>
                                        <option>A-</option>
                                        <option>B+</option>
                                        <option>B-</option>
                                        <option>AB+</option>
                                        <option>AB-</option>
                                        <option>O+</option>
                                        <option>O-</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td><b>Religion</b></td>
                                <td>:</td>
                                <td>
                                    <select>
                                        <option>Islam</option>
                                        <option>Hinduism</option>
                                        <option>Christianity</option>
                                        <option>Buddhism</option>
                                    </select>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </td>
                <!-- Contact Information -->
                <td valign="top">
                    <fieldset>
                        <legend>Contact Information</legend>
                        <table cellpadding="8">
                            <tr>
                                <td><b>Email</b></td>
                                <td>:</td>
                                <td><input type="email"></td>
                            </tr>
                            <tr>
                                <td><b>Phone/Mobile</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td><b>Website</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td valign="top"><b>Present Address</b></td>
                                <td valign="top">:</td>
                                <td>
                                    <fieldset>
                                        <legend>Present Address</legend>
                                        <select>
                                            <option>Bangladesh</option>
                                        </select>
                                        <select>
                                            <option>Dhaka</option>
                                            <option>Chattogram</option>
                                            <option>Rajshahi</option>
                                            <option>Khulna</option>
                                            <option>Sylhet</option>
                                            <option>Barishal</option>
                                            <option>Rangpur</option>
                                            <option>Mymensingh</option>
                                        </select>
                                        <br><br>
                                        <textarea rows="5" cols="22"
                                            placeholder="Road/Street/City"></textarea>
                                        <br><br>
                                        <input type="text" placeholder="Post Code">
                                    </fieldset>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </td>
                <!-- Account Information -->
                <td valign="top">
                    <fieldset>
                        <legend>Account Information</legend>
                        <table cellpadding="8">
                            <tr>
                                <td><b>Username</b></td>
                                <td>:</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td><b>Password</b></td>
                                <td>:</td>
                                <td><input type="password"></td>
                            </tr>
                            <tr>
                                <td><b>Confirm Password</b></td>
                                <td>:</td>
                                <td><input type="password"></td>
                            </tr>
                            <tr>
                                <td colspan="3" align="center">
                                    <input type="submit" value="Register">
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
